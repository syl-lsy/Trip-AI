name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lsygcy1314
          POSTGRES_PASSWORD: 123456
          POSTGRES_DB: trip-planner
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install

      - name: Generate Prisma client
        run: pnpm --filter server run prisma:generate
        env:
          DATABASE_URL: postgresql://lsygcy1314:123456@localhost:5432/trip-planner

      - name: Push database schema
        run: pnpm --filter server exec prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://lsygcy1314:123456@localhost:5432/trip-planner

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm -r test
        env:
          DATABASE_URL: postgresql://lsygcy1314:123456@localhost:5432/trip-planner

      - name: Build
        run: pnpm -r build
        env:
          DATABASE_URL: postgresql://lsygcy1314:123456@localhost:5432/trip-planner
